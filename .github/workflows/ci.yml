name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --package seekout-mcp-search
      - run: uv run ruff check packages/search/seekout_mcp_search/ packages/search/tests/
      - run: uv run pytest packages/search/tests -v
