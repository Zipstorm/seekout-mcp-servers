[project]
name = "seekout-mcp-search"
version = "0.1.0"
description = "SeekOut people search MCP server"
requires-python = ">=3.12"
dependencies = [
    "fastmcp[code-mode]>=3.0,<4.0",
    "httpx>=0.27",
    "pydantic>=2.0,<3.0",
    "pydantic-settings>=2.0,<3.0",
    "cachetools>=5.0",
    "redis>=5.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100

[tool.hatch.build.targets.wheel]
packages = ["seekout_mcp_search"]
