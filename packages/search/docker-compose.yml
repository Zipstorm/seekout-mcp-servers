services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  mcp:
    build:
      context: .
      target: dev
    ports:
      - "8001:8001"
    environment:
      SPOT_ENV: local
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
